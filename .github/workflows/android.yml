name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 加了这个，以后你可以在网页上直接点按钮打包！

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 下载代码与完整历史 (救命关键)
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0 # 就是这行！获取完整历史记录，解决 cmake 报错

    - name: 2. 安装 Go 语言环境
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: 3. 安装 Java 21 环境
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: 4. 赋予编译权限
      run: chmod +x gradlew

    - name: 5. 开始组装 APP
      run: ./gradlew assembleDebug --stacktrace

    - name: 6. 输出安装包
      uses: actions/upload-artifact@v4
      with:
        name: BingGeVPN-App
        path: app/build/outputs/apk/**/*.apk
